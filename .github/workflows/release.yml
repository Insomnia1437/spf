name: Release Build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build and Package
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet Packages
      run: dotnet restore SPF.sln

    - name: Build Solution
      run: dotnet build SPF.sln --configuration Release --no-restore

    - name: Publish Framework-Dependent Portable Executable (Lightweight ~9MB)
      run: |
        dotnet publish SPF/SPF.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained false `
          -p:PublishSingleFile=true `
          --output ./publish/framework_dependent

    - name: Publish Self-Contained Portable Executable (Standalone ~150MB)
      run: |
        dotnet publish SPF/SPF.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=false `
          -p:PublishTrimmed=false `
          --output ./publish/self_contained

    - name: Prepare Zip Contents
      run: |
        mkdir ./publish/spf-portable-windows-${{ github.ref_name }}
        cp ./publish/framework_dependent/SPF.exe ./publish/spf-portable-windows-${{ github.ref_name }}/SPF.exe
        cp ./docs/tunnels.json ./publish/spf-portable-windows-${{ github.ref_name }}/tunnels.json
        cp ./docs/readme.txt ./publish/spf-portable-windows-${{ github.ref_name }}/readme.txt

        mkdir ./publish/spf-standalone-windows-${{ github.ref_name }}
        cp ./publish/self_contained/SPF.exe ./publish/spf-standalone-windows-${{ github.ref_name }}/SPF.exe
        cp ./docs/tunnels.json ./publish/spf-standalone-windows-${{ github.ref_name }}/tunnels.json
        cp ./docs/readme.txt ./publish/spf-standalone-windows-${{ github.ref_name }}/readme.txt

    - name: Compress Releases into Zip Archives
      run: |
        Compress-Archive -Path ./publish/spf-portable-windows-${{ github.ref_name }} -DestinationPath ./publish/spf-portable-windows-${{ github.ref_name }}.zip
        Compress-Archive -Path ./publish/spf-standalone-windows-${{ github.ref_name }} -DestinationPath ./publish/spf-standalone-windows-${{ github.ref_name }}.zip

    - name: Upload Framework-Dependent Artifact
      uses: actions/upload-artifact@v7
      with:
        name: spf-portable-windows-${{ github.ref_name }}
        path: ./publish/spf-portable-windows-${{ github.ref_name }}.zip

    - name: Upload Standalone Artifact
      uses: actions/upload-artifact@v7
      with:
        name: spf-standalone-windows-${{ github.ref_name }}
        path: ./publish/spf-standalone-windows-${{ github.ref_name }}.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./publish/spf-portable-windows-${{ github.ref_name }}.zip
          ./publish/spf-standalone-windows-${{ github.ref_name }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
